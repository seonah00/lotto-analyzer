name: 🎱 로또 데이터 자동 업데이트

on:
  schedule:
    # 매주 월요일 오전 9시 (KST) = UTC 기준 일요일 밤 12시
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ 레포지토리 체크아웃
        uses: actions/checkout@v4
        
      - name: 🟢 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📊 최신 로또 데이터 수집
        run: node scripts/update-data.js
        
      - name: 💾 변경사항 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/frequency.json data/last-updated.txt index.html
          git diff --cached --quiet || git commit -m "📊 로또 데이터 자동 업데이트 ($(date +%Y-%m-%d))"
          git push
          
      - name: 📦 GitHub Pages 배포
        uses: actions/deploy-pages@v4
